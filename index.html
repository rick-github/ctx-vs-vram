//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 98304, ram: 237846375424, vram: 237846375424, nvram: 113122476032 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 114688, ram: 254489373696, vram: 254489373696, nvram: 116075266048 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 131072, ram: 271132371968, vram: 271132371968, nvram: 119028056064 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 147456, ram: 287775370240, vram: 287775370240, nvram: 121980846080 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 163840, ram: 346025864192, vram: 346025864192, nvram: 140469338112 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 180224, ram: 366829612032, vram: 366829612032, nvram: 143774449664 },
//  { model: "frob/minimax-m2.5:230b-a10b-q4_K_M", quant: "Q4_K_M", context: 196608, ram: 387633359872, vram: 383945237504, nvram: 141048152064 },
];

const palette = [
  "#3266ad","#c85250","#4e9a51","#9b6db5","#d17a2f",
  "#5baab0","#b55e8c","#7b7b2a","#4a7abf","#e06060",
  "#45a087","#d4aa44","#888888","#c07840","#6644aa",
  "#2e8b8b","#a04060","#3a9ad4"
];

const models = [...new Set(raw.map(r => r.model))];

const datasets = models.map((m, i) => {
  const pts = raw.filter(r => r.model === m).sort((a, b) => a.context - b.context);
  return {
    label: m,
    data: pts.map(p => ({ x: p.context / 1024, y: +(p.ram / 1e9).toFixed(2) })),
    borderColor: palette[i % palette.length],
    backgroundColor: palette[i % palette.length],
    borderWidth: 2,
    pointRadius: 3,
    pointHoverRadius: 5,
    tension: 0.3,
    fill: false,
  };
});

const allContextsK = [...new Set(raw.map(r => r.context / 1024))].sort((a, b) => a - b);
const maxSteps = allContextsK.length;

const slider = document.getElementById('xmax-slider');
const xmaxLabel = document.getElementById('xmax-label');
slider.min = 1;
slider.max = maxSteps;
slider.value = maxSteps;

function formatK(k) {
  return k >= 1024 ? (k / 1024).toFixed(1).replace(/\.0$/, '') + 'M' : Math.round(k) + 'K';
}

function getXMax() {
  return allContextsK[parseInt(slider.value) - 1];
}

xmaxLabel.textContent = formatK(getXMax());

const chart = new Chart(document.getElementById('myChart'), {
  type: 'line',
  data: { datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'nearest', intersect: false, axis: 'xy' },
    plugins: {
      legend: { display: false },
      title: { display: false },
      tooltip: {
        mode: 'nearest',
        intersect: false,
        backgroundColor: '#1e1e1e',
        borderColor: '#444',
        borderWidth: 1,
        titleColor: '#aaa',
        bodyColor: '#ddd',
        callbacks: {
          title: items => 'Context: ' + formatK(items[0].parsed.x) + ' tokens',
          label: item => ' ' + item.dataset.label + ': ' + item.parsed.y.toFixed(1) + ' GB'
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        min: 0,
        max: getXMax(),
        title: { display: true, text: 'Context (K tokens)', color: '#666', font: { size: 12 } },
        ticks: { color: '#666', callback: v => formatK(v) },
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { color: '#333' }
      },
      y: {
        title: { display: true, text: 'VRAM (GB)', color: '#666', font: { size: 12 } },
        ticks: { color: '#666', callback: v => v + ' GB' },
        grid: { color: 'rgba(255,255,255,0.06)' },
        border: { color: '#333' }
      }
    }
  }
});

slider.addEventListener('input', () => {
  const xmax = getXMax();
  xmaxLabel.textContent = formatK(xmax);
  chart.options.scales.x.max = xmax;
  chart.update();
});

const legendEl = document.getElementById('legend');

document.getElementById('btn-all').addEventListener('click', () => {
  chart.data.datasets.forEach(ds => ds.hidden = false);
  chart.update();
  document.querySelectorAll('.leg-btn').forEach(b => b.style.opacity = '1');
});

document.getElementById('btn-none').addEventListener('click', () => {
  chart.data.datasets.forEach(ds => ds.hidden = true);
  chart.update();
  document.querySelectorAll('.leg-btn').forEach(b => b.style.opacity = '0.3');
});

datasets.forEach((ds, i) => {
  const btn = document.createElement('button');
  btn.className = 'leg-btn';
  btn.style.border = '0.5px solid ' + ds.borderColor;
  btn.innerHTML = '<span class="swatch" style="background:' + ds.borderColor + '"></span>' + ds.label;
  btn.addEventListener('click', () => {
    ds.hidden = !ds.hidden;
    btn.style.opacity = ds.hidden ? '0.3' : '1';
    chart.update();
  });
  legendEl.appendChild(btn);
});
</script>
</body>
</html>
